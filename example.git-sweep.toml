# git-sweep configuration example
# Place this file at the root of your workspace or home directory
# as .git-sweep.toml

[sweep]
# Branch to treat as the integration branch
base_branch = "main"

# Branches that will never be deleted
protected_branches = ["main", "master", "develop", "staging", "HEAD"]

# Only delete branches whose last commit is older than this threshold.
# Supported units: d (days), w (weeks), m (months, approx 30 days)
# Set to "0d" to disable age filtering.
min_age = "30d"

# Maximum directory depth to search for git repos (0 = current dir only)
max_depth = 3

# Paths to exclude from scanning (glob patterns)
exclude = [
    "**/vendor/**",
    "**/node_modules/**",
    "**/.cache/**",
]

[remote]
# Automatically prune stale remote-tracking references
prune_stale = true

# Remote name to prune
remote_name = "origin"

[output]
# Output format: "text" or "json"
format = "text"

# Colorize terminal output
color = true

[snapshot]
# Directory where sweep snapshots are stored
dir = "~/.git-sweep/snapshots"
